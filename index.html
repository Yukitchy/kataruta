<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>カタルタ｜会話をつむぐカード</title>
<style>
  :root{ --paper:#fdfbf7; --ink:#2b2620; --sub:#8a8177; --line:#e6ded0; --accent:#c0392b; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:var(--paper); color:var(--ink);
    font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic",system-ui,sans-serif;
    display:flex;flex-direction:column;min-height:100dvh;overflow-x:hidden;
  }

  /* ---------- setup ---------- */
  #setup{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:32px 20px}
  #lang{display:flex;gap:8px}
  h1{font-size:clamp(28px,6vw,44px);margin:0;letter-spacing:.12em;text-align:center}
  h1 small{display:block;font-size:13px;letter-spacing:.25em;color:var(--sub);margin-top:10px;font-weight:400}
  .decks{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:680px}
  .deck{
    border:2px solid var(--line);background:#fff;border-radius:16px;padding:14px 20px;cursor:pointer;
    font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px;transition:.15s;color:var(--sub);
    font-family:inherit;text-align:left;
  }
  .deck .dot{width:14px;height:14px;border-radius:50%;background:var(--line);flex:0 0 auto}
  .deck[aria-pressed="true"]{border-color:var(--c);color:var(--ink);box-shadow:0 4px 0 var(--c)}
  .deck[aria-pressed="true"] .dot{background:var(--c)}
  .deck small{display:block;font-size:11px;font-weight:400;color:var(--sub)}
  .btn{border:none;border-radius:999px;padding:16px 44px;font-size:18px;font-weight:700;
       background:var(--ink);color:#fff;cursor:pointer;font-family:inherit}
  .btn:disabled{opacity:.3;cursor:default}
  .btn.sm{padding:12px 28px;font-size:15px}
  .hint{color:var(--sub);font-size:13px;text-align:center;line-height:1.9;max-width:540px}

  /* ---------- play ---------- */
  #play{display:none;flex:1;flex-direction:column;min-height:100dvh}
  header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line);
         flex-wrap:wrap;font-size:13px;color:var(--sub)}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;font-size:13px;
        cursor:pointer;font-family:inherit;color:var(--sub);font-weight:700}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip:disabled{opacity:.3;cursor:default}
  #redoRow{display:flex;justify-content:center;padding:12px 0 0}
  .spacer{flex:1}
  #count{font-variant-numeric:tabular-nums;font-weight:700;color:var(--ink)}

  #turn{text-align:center;font-size:clamp(15px,3.5vw,20px);font-weight:700;padding:14px 10px 0;letter-spacing:.05em}
  #turn span{color:var(--accent)}
  #odai{text-align:center;font-size:clamp(14px,3.4vw,18px);padding:8px 20px;min-height:1.5em;font-weight:700}
  #odai b{color:var(--accent);font-size:11px;letter-spacing:.2em;margin-right:8px;vertical-align:2px}

  #stage{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;perspective:1400px}
  /* 山札に見せる：カードの後ろに紙を2枚ずらして敷く */
  #cardWrap{position:relative;width:min(92vw,620px);aspect-ratio:5/3.2}
  #cardWrap::before,#cardWrap::after{content:"";position:absolute;inset:0;border-radius:24px;background:#fff;
    border:1px solid var(--line);z-index:-1}
  #cardWrap::before{transform:translate(7px,7px)}
  #cardWrap::after{transform:translate(14px,14px)}
  #cardWrap.last::before,#cardWrap.last::after{display:none}
  #card{width:100%;height:100%;cursor:pointer;position:relative;transform-style:preserve-3d;
        transition:transform .45s cubic-bezier(.2,.8,.25,1);border:none;padding:0;background:none;font-family:inherit}
  #card.flip{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:24px;background:#fff;
        border:1px solid var(--line);box-shadow:0 10px 30px rgba(80,60,30,.12);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px}
  .face.back{transform:rotateY(180deg)}
  .word{font-size:clamp(30px,8.5vw,70px);font-weight:800;line-height:1.15;text-align:center;letter-spacing:.02em}
  .romaji{font-size:clamp(13px,3vw,20px);color:var(--sub);letter-spacing:.08em}
  .en{font-size:clamp(14px,3.2vw,22px);color:var(--accent);font-weight:700;text-align:center}
  .tag{position:absolute;top:16px;left:20px;font-size:12px;font-weight:700;letter-spacing:.1em}
  .tap{position:absolute;bottom:16px;font-size:12px;color:var(--sub);letter-spacing:.1em}
  .hide{visibility:hidden}
  .idle .word{font-size:clamp(20px,5vw,32px);color:var(--sub);font-weight:700}

  #timer{height:6px;background:var(--line);border-radius:999px;width:min(92vw,620px);margin:0 auto;overflow:hidden;display:none}
  #timer i{display:block;height:100%;background:var(--accent);width:100%}

  /* ---------- ものがたりモード ---------- */
  #compose{display:none;flex-direction:column;gap:10px;align-items:center;padding:6px 14px 14px}
  #compose .prog{font-size:12px;color:var(--sub);font-weight:700;letter-spacing:.15em}
  #line{width:min(92vw,620px);border:2px solid var(--line);border-radius:16px;padding:14px 16px;
        font-family:inherit;font-size:clamp(16px,3.6vw,20px);line-height:1.6;resize:none;background:#fff;color:var(--ink)}
  #line:focus{outline:none;border-color:var(--accent)}
  .crow{display:flex;gap:10px;align-items:center}
  #mic[aria-pressed="true"]{background:var(--accent);color:#fff;border-color:var(--accent)}

  #log{display:flex;gap:8px;overflow-x:auto;padding:12px 14px 18px;border-top:1px solid var(--line);scrollbar-width:none}
  #log::-webkit-scrollbar{display:none}
  #log li{list-style:none;flex:0 0 auto;background:#fff;border:1px solid var(--line);border-left:4px solid var(--c,#ccc);
          border-radius:10px;padding:8px 12px;font-size:14px;font-weight:700;white-space:nowrap;color:var(--ink)}
  #log li small{display:block;font-size:10px;color:var(--sub);font-weight:400}

  /* ---------- 完成した物語 ---------- */
  #book{display:none;flex:1;align-items:center;justify-content:center;padding:24px 16px;min-height:100dvh}
  .sheet{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 10px 30px rgba(80,60,30,.12);
         padding:clamp(24px,5vw,44px);width:min(94vw,640px)}
  .sheet .lbl{font-size:11px;letter-spacing:.25em;color:var(--accent);font-weight:700}
  .sheet h2{font-size:clamp(18px,4.5vw,26px);margin:6px 0 0;line-height:1.5}
  #bList{margin:22px 0 0;padding:0;list-style:none;counter-reset:n}
  #bList li{font-size:clamp(16px,3.8vw,21px);line-height:1.9;padding:14px 0;border-bottom:1px dashed var(--line);
            display:flex;align-items:baseline;gap:10px}
  .cw{flex:0 0 auto;background:var(--paper);border:1px solid var(--line);border-radius:8px;
      padding:2px 10px;font-size:.72em;font-weight:700;color:var(--accent);white-space:nowrap}
  .bact{display:flex;gap:10px;margin-top:26px;flex-wrap:wrap;justify-content:center}
  @media (max-width:480px){ header{font-size:12px} .chip{padding:6px 11px;font-size:12px} }
</style>
</head>
<body>

<section id="setup">
  <div id="lang">
    <button class="chip" data-lang="ja" aria-pressed="true">日本語</button>
    <button class="chip" data-lang="en" aria-pressed="false">English</button>
  </div>
  <h1 id="t-title">カタルタ<small id="t-sub">C O N V E R S A T I O N　C A R D S</small></h1>
  <div class="decks" id="deckPick"></div>
  <button class="btn" id="start">はじめる</button>
  <p class="hint" id="t-hint"></p>
</section>

<section id="play">
  <header>
    <button class="chip" id="tStory" aria-pressed="false">ものがたり</button>
    <button class="chip" id="tHint" aria-pressed="true">意味 ON</button>
    <button class="chip" id="tTurn" aria-pressed="false">交互</button>
    <button class="chip" id="tTimer" aria-pressed="false">60秒</button>
    <button class="chip" id="odaiBtn">お題</button>
    <span class="spacer"></span>
    <span><span id="t-remain">のこり</span> <span id="count">0</span><span id="t-cards">枚</span></span>
    <button class="chip" id="shuffle">シャッフル</button>
    <button class="chip" id="back">デッキ選択</button>
  </header>

  <div id="turn" class="hide"></div>
  <div id="odai"></div>

  <div id="stage"><div id="cardWrap">
    <button id="card">
      <div class="face front idle">
        <div class="word" id="t-tap">タップしてめくる</div>
        <div class="tap" id="t-space">SPACE キーでもOK</div>
      </div>
      <div class="face back">
        <div class="tag" id="tag"></div>
        <div class="word" id="w"></div>
        <div class="romaji" id="r"></div>
        <div class="en" id="e"></div>
      </div>
    </button>
  </div></div>
  <div id="timer"><i></i></div>
  <div id="redoRow"><button class="chip" id="redraw" disabled>🔄 引き直し</button></div>

  <div id="compose">
    <div class="prog"><span id="pnum">1</span><span id="t-punit">文目</span></div>
    <textarea id="line" rows="2"></textarea>
    <div class="crow">
      <button class="chip" id="mic" aria-pressed="false">🎤</button>
      <button class="btn sm" id="next">つぎへ</button>
      <button class="chip" id="finish" disabled>おわり</button>
    </div>
  </div>

  <ul id="log"></ul>
</section>

<section id="book">
  <div class="sheet">
    <div class="lbl" id="t-booklbl">きょうの ものがたり</div>
    <h2 id="bTitle"></h2>
    <ol id="bList"></ol>
    <div class="bact">
      <button class="btn sm" id="copy">リンクをコピー</button>
      <button class="chip" id="again">もう一度あそぶ</button>
    </div>
  </div>
</section>

const $=s=>document.querySelector(s);
let lang="ja", L=null, DECKS=null;
let picked=new Set(["standard"]), pile=[], turnIdx=0, timerId=null, cur=null, story=null;

/* ---------- language ---------- */
function setLang(l){
  lang=l; L=DATA[l];
  DECKS = Object.fromEntries(Object.entries(L.decks).map(([k,v])=>[k,{
    ...v, cards: v.d.split(";").map(s=>{const[w,r,e]=s.split("|");return{w,r,e,deck:k}})
  }]));
  document.documentElement.lang=l;
  const u=L.ui;
  $("#t-title").childNodes[0].nodeValue=u.title; $("#t-sub").textContent=u.sub;
  $("#start").textContent=u.start; $("#t-hint").innerHTML=u.hint;
  $("#tStory").textContent=u.story; $("#tHint").textContent=u.hintOn; $("#tTurn").textContent=u.turn;
  $("#tTimer").textContent=u.timer; $("#odaiBtn").textContent=u.odai;
  $("#t-remain").textContent=u.remain; $("#t-cards").textContent=u.cards;
  $("#shuffle").textContent=u.shuffle; $("#back").textContent=u.back;
  $("#t-tap").textContent=u.tap; $("#t-space").textContent=u.space;
  $("#next").textContent=u.next; $("#mic").textContent=u.mic; $("#line").placeholder=u.ph;
  $("#redraw").textContent=u.redraw; $("#finish").textContent=u.finish; $("#t-punit").textContent=u.punit;
  $("#t-booklbl").textContent=u.bookLbl; $("#copy").textContent=u.copy; $("#again").textContent=u.again;
  document.querySelectorAll("#lang .chip").forEach(b=>b.setAttribute("aria-pressed",b.dataset.lang===l));
  picked=new Set(["standard"]); renderDecks(); $("#odai").innerHTML="";
}
function renderDecks(){
  $("#deckPick").innerHTML = Object.entries(DECKS).map(([k,v])=>
    `<button class="deck" data-k="${k}" style="--c:${v.c}" aria-pressed="${picked.has(k)}">
       <span class="dot"></span><span>${v.name}<small>${v.sub} ・ ${v.cards.length}</small></span></button>`).join("");
}
$("#lang").onclick = e=>{ const b=e.target.closest("[data-lang]"); if(b) setLang(b.dataset.lang); };

/* ---------- setup ---------- */
$("#deckPick").onclick = e=>{
  const b=e.target.closest(".deck"); if(!b)return;
  const k=b.dataset.k;
  picked.has(k)?picked.delete(k):picked.add(k);
  b.setAttribute("aria-pressed",picked.has(k));
  $("#start").disabled = picked.size===0;
};
$("#start").onclick = ()=>{ $("#setup").style.display="none"; $("#play").style.display="flex"; shuffle(); };
$("#back").onclick  = ()=>{ $("#play").style.display="none"; $("#setup").style.display="flex"; stopTimer(); };

/* ---------- pile ---------- */
function setCount(){
  $("#count").textContent = pile.length;
  $("#cardWrap").classList.toggle("last", pile.length<=2);
}
function refill(){
  pile = [...picked].flatMap(k=>DECKS[k].cards);
  for(let i=pile.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[pile[i],pile[j]]=[pile[j],pile[i]];}
  setCount();
}
function shuffle(){                       // 明示リセット：履歴もクリア
  refill(); $("#card").classList.remove("flip"); $("#log").innerHTML=""; cur=null;
  $("#redraw").disabled=true; stopTimer();
}
$("#shuffle").onclick = e=>{ e.stopPropagation(); shuffle(); };
/* 気に入らない札は捨てて引き直す（捨て札は履歴からも消す） */
$("#redraw").onclick = e=>{ e.stopPropagation();
  if(!cur) return;
  $("#log").firstElementChild?.remove();
  draw();
};

/* ---------- draw ---------- */
function draw(){
  if($("#card").classList.contains("flip")){ $("#card").classList.remove("flip"); setTimeout(draw,220); return; }
  if(!pile.length) refill();              // 引き切っても履歴は残す
  const c = cur = pile.pop();
  const d = DECKS[c.deck];
  $("#tag").textContent = d.name; $("#tag").style.color = d.c;
  $("#w").textContent = c.w; $("#r").textContent = c.r||""; $("#e").textContent = c.e;
  $("#card").classList.add("flip");
  setCount(); $("#redraw").disabled=false;

  const li=document.createElement("li");
  li.style.setProperty("--c",d.c);
  li.innerHTML = `${c.w}<small>${c.e}</small>`;
  $("#log").prepend(li);

  if($("#tTurn").getAttribute("aria-pressed")==="true"){ turnIdx^=1; renderTurn(); }
  if($("#tTimer").getAttribute("aria-pressed")==="true") startTimer();
  if(story) setTimeout(()=>$("#line").focus(),300);
}
$("#card").onclick = draw;
addEventListener("keydown", e=>{
  if($("#play").style.display==="none") return;
  if(/^(TEXTAREA|INPUT)$/.test(e.target.tagName)) return;   // 入力中はキーを奪わない
  if(e.code==="Space"||e.code==="Enter"){ e.preventDefault(); draw(); }
});

/* ---------- toggles ---------- */
function toggle(el){ el.setAttribute("aria-pressed", el.getAttribute("aria-pressed")!=="true"); }
$("#tHint").onclick = e=>{ toggle(e.target);
  const on = e.target.getAttribute("aria-pressed")==="true";
  e.target.textContent = on?L.ui.hintOn:L.ui.hintOff;
  $("#r").style.visibility = $("#e").style.visibility = on?"visible":"hidden";
};
$("#tTurn").onclick = e=>{ toggle(e.target);
  const on=e.target.getAttribute("aria-pressed")==="true";
  $("#turn").classList.toggle("hide",!on); renderTurn();
};
function renderTurn(){ $("#turn").innerHTML = L.ui.nextTurn(turnIdx?L.ui.p2:L.ui.p1); }
$("#tTimer").onclick = e=>{ toggle(e.target);
  const on=e.target.getAttribute("aria-pressed")==="true";
  $("#timer").style.display = on?"block":"none";
  if(!on) stopTimer();
};
function pickOdai(){ const t=L.odai[Math.random()*L.odai.length|0];
  $("#odai").innerHTML = `<b>${L.ui.odai}</b>${t}`; return t; }
$("#odaiBtn").onclick = e=>{ e.stopPropagation(); pickOdai(); };

/* ---------- 60s timer ---------- */
function startTimer(){
  stopTimer();
  const bar=$("#timer i"); let left=60;
  bar.style.transition="none"; bar.style.width="100%";
  requestAnimationFrame(()=>{ bar.style.transition="width 1s linear"; });
  timerId=setInterval(()=>{ left--; bar.style.width=(left/60*100)+"%"; if(left<=0) stopTimer(); },1000);
}
function stopTimer(){ if(timerId) clearInterval(timerId); timerId=null; }

/* ---------- ものがたりモード：カード1枚＝1文、5枚で1話 ---------- */
$("#tStory").onclick = e=>{ toggle(e.target);
  const on = e.target.getAttribute("aria-pressed")==="true";
  $("#compose").style.display = on?"flex":"none";
  if(on){ story={odai:pickOdai(),items:[],lang}; $("#pnum").textContent=1; $("#line").value="";
          $("#finish").disabled=true; shuffle(); }
  else story=null;
};
$("#line").addEventListener("keydown", e=>{
  // Enterで次へ。ただし日本語変換中(IME)のEnterは確定なので無視、Shift+Enterは改行
  if(e.key!=="Enter" || e.shiftKey || e.isComposing || e.keyCode===229) return;
  e.preventDefault(); $("#next").click();
});
$("#next").onclick = ()=>{
  if(!story) return;
  if(!cur){ draw(); return; }                       // まだ1枚もめくってない
  const t = $("#line").value.trim();
  if(!t){ $("#line").focus(); return; }
  story.items.push({w:cur.w, t});
  $("#line").value=""; cur=null;
  $("#pnum").textContent = story.items.length+1;
  $("#finish").disabled = false;             // 1文でも書けば、いつでも終われる
  draw();
};
$("#finish").onclick = ()=>{
  if(!story) return;
  const t = $("#line").value.trim();
  if(t && cur){ story.items.push({w:cur.w, t}); }   // 書きかけの一文も拾って締める
  if(story.items.length) showBook(story);
};

/* ---------- 音声入力（対応ブラウザのみ・結果はあとから直せる） ---------- */
const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR) $("#mic").style.display="none";
else{
  let rec=null;
  $("#mic").onclick = ()=>{
    if(rec){ rec.stop(); return; }
    rec = new SR(); rec.lang = lang==="ja" ? "ja-JP" : "en-US";
    rec.interimResults=true; rec.continuous=true;
    const base = $("#line").value;
    rec.onresult = ev=>{
      let s=""; for(let i=0;i<ev.results.length;i++) s+=ev.results[i][0].transcript;
      $("#line").value = (base+s).trim();
    };
    rec.onend = ()=>{ rec=null; $("#mic").setAttribute("aria-pressed","false"); $("#line").focus(); };
    rec.onerror = rec.onend;
    rec.start(); $("#mic").setAttribute("aria-pressed","true");
  };
}

/* ---------- 完成 → 文庫ページ＋共有リンク（サーバー不要・URLに物語を格納） ---------- */
const esc = x=>x.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
/* UTF-8 → base64（日本語をそのまま％符号化すると URL が3倍に膨らむため） */
const b64e = o=>btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(o))));
const b64d = s=>JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(s),c=>c.charCodeAt(0))));
function showBook(s){
  if(s.lang && s.lang!==lang) setLang(s.lang);
  $("#setup").style.display="none"; $("#play").style.display="none"; $("#book").style.display="flex";
  $("#bTitle").textContent = s.odai;
  $("#bList").innerHTML = s.items.map(i=>`<li><span class="cw">${esc(i.w)}</span><span>${esc(i.t)}</span></li>`).join("");
  location.hash = "s=" + b64e(s);
  stopTimer();
}
$("#copy").onclick = async e=>{
  try{ await navigator.clipboard.writeText(location.href); e.target.textContent=L.ui.copied; }
  catch{ e.target.textContent=location.href; }
};
$("#again").onclick = ()=>{ location.hash=""; location.reload(); };

/* ---------- 起動 ---------- */
setLang(navigator.language && navigator.language.startsWith("ja") ? "ja" : "ja");
(()=>{ const m=location.hash.match(/s=(.+)/);
  if(!m) return;
  try{ showBook(b64d(m[1])); }catch{}
})();

/* self-check: 両言語ぶん、3項目そろったカードだけを持つ */
console.assert(Object.values(DATA).every(l=>Object.values(l.decks).every(d=>{
  const c=d.d.split(";").map(s=>s.split("|"));
  return c.length>35 && c.every(x=>x.length===3 && x[0] && x[2]);
})), "deck data broken");
</script>
</body>
</html>
